<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting — SoulVani</title>
<script>
  // Redirect bare album names to the albums/ subdirectory
  const albums = ['ishq-beqarar', 'tu-hai-yahin', 'adhure-lamhein'];
  const path = window.location.pathname;
  const base = '/soulvani1';
  for (const a of albums) {
    if (path === base + '/' + a + '.html' || path === '/' + a + '.html') {
      window.location.replace(base + '/albums/' + a + '.html');
    }
  }
  // Fallback: go home
  setTimeout(() => window.location.replace(base + '/'), 1500);
</script>
</head>
<body style="font-family:Georgia,serif;background:#FBF6F2;color:#2A1838;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;">
  <div>
    <div style="font-size:48px;margin-bottom:12px;">✦</div>
    <p style="font-size:20px;font-style:italic;">Redirecting…</p>
  </div>
</body>
</html>
